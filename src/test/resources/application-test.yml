spring:
  jackson:
    time-zone: Europe/Paris
  datasource:
    url: jdbc:postgresql://localhost:5432/lotodb_test
    # driver-class-name: org.postgresql.Driver
    username: postgrestest
    password: postgrestest
    hikari:
      maximum-pool-size: 5   # 🔥 évite saturation

  jpa:
    hibernate:
      ddl-auto: create-drop  # reset DB à chaque test
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false

  data:
    mongodb:
      # uri: mongodb://localhost:27017/lotodb_test
      uri: mongodb://mongo:mongo@localhost:27017/lotodb_test?authSource=lotodb_test
      # uri: mongodb://mongotest:mongotest@localhost:27017/lotodb_test?authSource=admin

logging:
  level:
    root: WARN


