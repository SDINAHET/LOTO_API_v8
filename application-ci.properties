# ===============================
# 🔐 MongoDB (CI - Docker)
# ===============================
spring.data.mongodb.uri=mongodb://mongotest:mongotest@mongodb:27017/lotodb_test?authSource=admin

# ===============================
# 🐘 PostgreSQL (CI)
# ===============================
# spring.datasource.url=jdbc:postgresql://postgres:5432/lotodb
spring.datasource.url=jdbc:postgresql://localhost:5432/lotodb_test
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===============================
# 🔧 Server
# ===============================
server.port=8082

# ===============================
# 🧪 Tests
# ===============================
spring.main.allow-bean-definition-overriding=true
spring.jpa.open-in-view=false

# ===============================
# 🔐 JWT
# ===============================
jwt.secret=ci-secret-key
jwt.expiration=3600000
