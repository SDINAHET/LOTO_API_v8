version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      # redis:
      #   condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: ci
      TZ: Europe/Paris
      # JAVA_TOOL_OPTIONS: "-Duser.timezone=Europe/Paris"
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m -Duser.timezone=Europe/Paris"

      # Mongo
      # SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/lotodb

      # 🔐 Mongo sécurisé
      SPRING_DATA_MONGODB_URI: mongodb://mongo:mongo@mongodb:27017/lotodb?authSource=admin
      # SPRING_DATA_MONGODB_URI: mongodb://mongo:mongo@mongodb:27017/lotodb?authSource=lotodb

      # Postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lotodb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - "5500:5500"
    depends_on:
      - backend

  mongodb:
    image: mongo:latest
    restart: always
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo
      MONGO_INITDB_DATABASE: lotodb
      TZ: Europe/Paris
    volumes:
      # - /var/lib/mongodb:/data/db
      # - /var/lib/mongodb-docker:/data/db

      # - /data/docker/mongodb:/data/db
      # - ./docker/mongo/mongo-init.sh:/docker-entrypoint-initdb.d/mongo-init.sh
      - mongodb_data:/data/db
      - ./docker/mongo/mongo-init.sh:/mongo-init.sh

  postgres:
    image: postgres:14
    restart: always
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: lotodb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Paris
      PGTZ: Europe/Paris
    volumes:
      # - /var/lib/postgresql-docker:/var/lib/postgresql/data
      - /data/docker/postgres:/var/lib/postgresql/data
      # - /var/lib/postgresql:/var/lib/postgresql/data
      # - postgres_data:/var/lib/postgresql/data   # ✅ PERSISTENCE ACTIVÉE
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      # (optionnel) persistance réelle :
      # - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lotodb"]
      interval: 10s
      timeout: 5s
      retries: 20

  # uptime-kuma:
  #   image: louislam/uptime-kuma
  #   container_name: uptime-kuma
  #   restart: always
  #   ports:
  #     - "3001:3001"
  #   volumes:
  #     - uptime_kuma_data:/app/data
  #     - /var/run/docker.sock:/var/run/docker.sock

  # =========================
  # AI SERVICE (OPTIONNEL)
  # =========================
  ai:
    image: python:3.11-slim
    profiles: ["ai"]   # ✅ ne démarre pas par défaut
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./ai.py:/app/ai.py:ro
    environment:
      TZ: Europe/Paris

      # Mongo
      # MONGO_URI: mongodb://mongodb:27017
      MONGO_URI: mongodb://mongo:mongo@mongodb:27017/?authSource=admin
      # MONGO_URI: mongodb://mongo:mongo@mongodb:27017/?authSource=lotodb
      MONGO_DB: lotodb
      MONGO_COL: historique

      # Ollama
      OLLAMA_BASE: http://ollama:11434

      # ✅ IMPORTANT: modèle léger pour 8 Go
      # Très bon compromis :
      OLLAMA_MODEL: llama3.1:8b
      # Très bon compromis :
      # OLLAMA_MODEL: llama3.2:3b
      # Alternative légère :
      # OLLAMA_MODEL: phi3:mini

      # ✅ évite les longues phrases qui explosent:
      MAX_MESSAGE_LEN: "900"
      OLLAMA_TIMEOUT_SEC: "360"

      # (optionnel) si tu ajoutes une logique AI_ENABLED dans ai.py plus tard
      # AI_ENABLED: "1"
    command: >
      sh -c "pip install --no-cache-dir fastapi uvicorn httpx pymongo &&
             uvicorn ai:app --host 0.0.0.0 --port 8091"
    ports:
      - "8091:8091"
    depends_on:
      - mongodb
      - ollama

  ollama:
    image: ollama/ollama:latest
    profiles: ["ai"]   # ✅ ne démarre pas par défaut
    restart: unless-stopped
    ports:
      - "11436:11434"
    volumes:
      - ollama_data:/root/.ollama
    # ✅ Limites mémoire: "deploy:" n'est pas appliqué par docker compose classique.
    # Utilise plutôt mem_limit.
    mem_limit: 20g

  # redis:
  #   image: redis:7-alpine
